<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../index_sub/det.css">
    <title>Detail Page — 포트폴리오</title>
</head>
<body>
    <div id="container">

        <!-- 헤더 / 메뉴 -->
        <header id="header">
            <div class="container">
                <div class="logo">
                    <h1><a href="../index.html">PortPolio</a></h1>
                </div>
                <nav class="menu">
                    <ul>
                        <li><a href="../index_sub/web.html">Web Site</a></li>
                        <li><a href="../index_sub/ban.html">Banner</a></li>
                        <li><a href="../index_sub/det.html">Detail Page</a></li>
                        <li><a href="../index_sub/uxui.html">UX/UI</a></li>
                        <li><a href="../index_sub/about.html">About me</a></li>
                    </ul>
                    <div class="sub-menu">
                        <div class="sub-space">
                            <span>Menu</span>
                            <span>Menu</span>
                        </div>
                    </div>
                </nav>
            </div>

            <!-- 모바일 오버레이 -->
            <div class="overlay" role="dialog" aria-modal="true" aria-label="모바일 메뉴">
                <button class="close-btn" aria-label="메뉴 닫기">&times;</button>
                <nav class="sub-btn">
                    <a href="../index.html">Home</a>
                    <a href="../index_sub/web.html">Web Site</a>
                    <a href="../index_sub/ban.html">Banner</a>
                    <a href="../index_sub/det.html">Detail Page</a>
                    <a href="../index_sub/uxui.html">UX/UI</a>
                    <a href="../index_sub/about.html">About Me</a>
                </nav>
            </div>
        </header>

        <!-- 컨텐츠 -->
        <main id="section">
            <h1>Detail Page</h1>
            <hr class="line line--top">

            <!-- 카테고리 탭 -->
            <div class="category">
                <ul>
                    <li class="active" data-filter="all">All</li>
                    <li data-filter="Laptop">Laptop</li>
                    <li data-filter="DB">DB</li>
                </ul>
            </div>

            <!-- 카드 목록 -->
            <div class="category-list">
                <a href="../sub_page/lenovo_page.html">
                    <div class="list-a" data-category="Laptop"></div>
                </a>
                <a href="../sub_page/asus_page.html">
                    <div class="list-b" data-category="Laptop"></div>
                </a>
                <a href="../sub_page/razer_page.html">
                    <div class="list-c" data-category="Laptop"></div>
                </a>
                <a href="../sub_page/dbking_page.html">
                    <div class="list-d" data-category="DB"></div>
                </a>
            </div>

            <hr class="line line--bottom">
        </main>

        <!-- 하단 -->
        <footer id="footer">
            <nav class="footer-nav">
                <a href="../index.html">Home</a>
                <a href="../index_sub/web.html">Web Site</a>
                <a href="../index_sub/ban.html">Banner</a>
                <a href="../index_sub/det.html">Detail Page</a>
                <a href="../index_sub/uxui.html">UX/UI</a>
                <a href="../index_sub/about.html">About me</a>
            </nav>
            <p class="footer-copy">Copyright &copy; lee.w.h All rights reserved.</p>
        </footer>

    </div>

    <script src="../index.js"></script>
    <script>
        // 카테고리 필터
        const tabList   = document.querySelectorAll('.category ul li');
        const cardItems = document.querySelectorAll('.category-list [data-category]');

        tabList.forEach(tab => {
            tab.addEventListener('click', function () {
                tabList.forEach(el => el.classList.remove('active'));
                this.classList.add('active');

                const filter = this.dataset.filter;

                cardItems.forEach(item => {
                    const wrapper = item.closest('a') ?? item;
                    wrapper.style.display =
                        (filter === 'all' || item.dataset.category === filter)
                        ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
