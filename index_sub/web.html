<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../index_sub/web.css">
    <title>Web Site</title>
</head>
<body>
    <div id="container">

        <!-- 헤더 / 메뉴 -->
        <header id="header">
            <div class="container">
                <div class="logo">
                    <h1><a href="../index.html">PortPolio</a></h1>
                </div>
                <nav class="menu">
                    <ul>
                        <li><a href="../index_sub/web.html">Web Site</a></li>
                        <li><a href="../index_sub/ban.html">Banner</a></li>
                        <li><a href="../index_sub/det.html">Detail Page</a></li>
                        <li><a href="../index_sub/uxui.html">UX/UI</a></li>
                        <li><a href="../index_sub/about.html">About me</a></li>
                    </ul>
                    <div class="sub-menu">
                        <div class="sub-space">
                            <span>Menu</span>
                            <span>Menu</span>
                        </div>
                    </div>
                </nav>
            </div>

            <!-- 모바일 오버레이 -->
            <div class="overlay" role="dialog" aria-modal="true" aria-label="모바일 메뉴">
                <button class="close-btn" aria-label="메뉴 닫기">&times;</button>
                <nav class="sub-btn">
                    <a href="../index.html">Home</a>
                    <a href="../index_sub/web.html">Web Site</a>
                    <a href="../index_sub/ban.html">Banner</a>
                    <a href="../index_sub/det.html">Detail Page</a>
                    <a href="../index_sub/uxui.html">UX/UI</a>
                    <a href="../index_sub/about.html">About Me</a>
                </nav>
            </div>
        </header>

        <!-- 컨텐츠 -->
        <main id="section">
            <h1>Web Site</h1>
            <hr class="line line--top">

            <!-- 카테고리 탭 -->
            <div class="category">
                <ul>
                    <li class="active" data-filter="all">All</li>
                    <li data-filter="Company">Company</li>
                </ul>
            </div>

            <!-- 카드 목록 -->
            <div class="category-list">
                <a href="../sub_page/NexaCloud_main.html">
                    <div class="list-a" data-category="Company"></div>
                </a>
            </div>

            <hr class="line line--bottom">
        </main>

        <!-- 하단 -->
        <footer id="footer">
            <nav class="footer-nav">
                <a href="../index.html">Home</a>
                <a href="../index_sub/web.html">Web Site</a>
                <a href="../index_sub/ban.html">Banner</a>
                <a href="../index_sub/det.html">Detail Page</a>
                <a href="../index_sub/uxui.html">UX/UI</a>
                <a href="../index_sub/about.html">About me</a>
            </nav>
            <p class="footer-copy">Copyright &copy; onflou. All rights reserved.</p>
        </footer>
    </div>

    <script src="../index.js"></script>
    <script>
        // 카테고리 필터
        const tabList  = document.querySelectorAll('.category ul li');
        // 수정: '.inven [data-category]' → '.category-list [data-category]'
        const cardItems = document.querySelectorAll('.category-list [data-category]');

        tabList.forEach(tab => {
            tab.addEventListener('click', function () {
                // active 이동
                tabList.forEach(el => el.classList.remove('active'));
                this.classList.add('active');

                const filter = this.dataset.filter;

                cardItems.forEach(item => {
                    // 카드를 감싸는 <a> 태그를 show/hide
                    const wrapper = item.closest('a') ?? item;
                    const isVisible = filter === 'all' || item.dataset.category === filter;
                    wrapper.style.display = isVisible ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
