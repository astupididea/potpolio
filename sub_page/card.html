<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../reset.css">
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../index_sub/web.css">
    <title>알뜰교통카드 리뉴얼</title>
    <style>
        :root {
            --color-black:  #000;
            --color-white:  #fff;
            --color-gray:   #999;
            --color-card:   #222;
        }

        body {
            margin: 0;
        }

        #container{
            display: block;
        }

        /* =====================
           히어로 섹션
           ===================== */
        .hero {
            position: relative;
            width: 100%;
            height: 50vh;
            overflow: hidden;
            background-color: var(--color-black);
        }

        .hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;   /* 주요 피사체가 상단에 있는 경우 */
        }

        /* 히어로 콘텐츠 전체 래퍼 */
        .hero-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;      /* 텍스트를 하단에 배치 */
            align-items: center;
            padding: clamp(30px, 5vw, 150px);
            /* 하단 그라디언트로 텍스트 가독성 확보 */
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(0, 0, 0, 0.85) 100%
            );
        }

        /* 뒤로가기 버튼 */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 18px;
            color: var(--color-black);
            background-color: var(--color-white);
            border-radius: 50px;
            padding: 15px 25px 15px 25px;
            align-items: center;
            justify-content: center;
            transform: rotate(-180deg);
            transition: opacity 0.3s ease;
        }

        .back-btn:hover {
            opacity: 0.7;
        }

        .hero-content h1 {
            color: var(--color-white);
            font-size: clamp(3rem, 8vw, 8rem);
            margin: 0 0 8px 0;
            line-height: 1;
            font-weight: 200;
        }

        .hero-content .subtitle {
            color: var(--color-gray);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            margin: 10px 0 clamp(20px, 4vh, 100px) 4px;
            font-weight: 700;
        }

        /* =====================
           포트폴리오 이미지 영역
           ===================== */
        .img-box {
            /* padding: clamp(40px, 8vw, 200px) clamp(16px, 8vw, 200px); */
            display: flex;
            flex-direction: column;        /* 모바일: 세로 스택 */
            justify-content: center;
            background-color: var(--color-black);
        }

        .banner-box {
            width: 100%;                   /* 모바일: 전체 너비 */
        }

        .banner-box img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 20px;
        }

        /* 이미지 캡션 */
        .banner-box p {
            font-size: clamp(0.85rem, 2vw, 1.125rem);
            color: var(--color-white);
            text-align: center;
            background-color: var(--color-card);
            margin: 0 0 10px 0;
            padding: 6px 0;
            border-radius: 4px;
        }

        #footer{
            margin: 0 auto 50px auto;
        }

        /* =====================
           태블릿 이상 (768px~)
           ===================== */
        @media (min-width: 768px) {
            .img-box {
                flex-direction: row;
                align-items: flex-start;
            }

            .banner-box {
                width: calc(50% - 10px);
            }
        }

        /* =====================
           PC 이상 (1024px~)
           ===================== */
        @media (min-width: 1024px) {
            .banner-box {
                width: calc(80% - 30px);
            }
        }
    </style>
</head>
<body>

        <!-- 히어로 섹션 -->
